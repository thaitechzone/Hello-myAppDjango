version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: smartfarm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: smartfarm
      POSTGRES_USER: smartfarm_user
      POSTGRES_PASSWORD: changeme_in_production
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfarm_user -d smartfarm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smartfarm_network

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfarm_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 60 smartfarm.wsgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=smartfarm.settings_docker
      - DATABASE_URL=postgresql://smartfarm_user:changeme_in_production@db:5432/smartfarm
      - SECRET_KEY=your-secret-key-change-in-production-min-50-chars
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartfarm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - สำหรับ production)
  nginx:
    image: nginx:alpine
    container_name: smartfarm_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - smartfarm_network

volumes:
  postgres_data:
    name: smartfarm_postgres_data
  static_volume:
    name: smartfarm_static
  media_volume:
    name: smartfarm_media

networks:
  smartfarm_network:
    driver: bridge
    name: smartfarm_network
