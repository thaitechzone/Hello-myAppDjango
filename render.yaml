services:
  # Web Service
  - type: web
    name: smartfarm-aiots
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn smartfarm.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: smartfarm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
    autoDeploy: true

databases:
  # PostgreSQL Database
  - name: smartfarm-db
    databaseName: smartfarm
    user: smartfarm_user
    plan: free
