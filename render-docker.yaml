services:
  # Web Service with Docker
  - type: web
    name: smartfarm-aiots-docker
    runtime: docker
    repo: https://github.com/thaitechzone/Hello-myAppDjango
    branch: master
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartfarm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DJANGO_SETTINGS_MODULE
        value: smartfarm.settings_render
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PORT
        value: 8000
    autoDeploy: true
    healthCheckPath: /

databases:
  # PostgreSQL Database
  - name: smartfarm-db
    databaseName: smartfarm
    user: smartfarm_user
    plan: free
