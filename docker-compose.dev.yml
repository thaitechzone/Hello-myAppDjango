version: '3.8'

# Docker Compose สำหรับ Development บน Docker Desktop
# ใช้ SQLite3 — ไม่ต้องการ PostgreSQL
# ใช้งาน: docker-compose -f docker-compose.dev.yml up

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: smartfarm_dev_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app  # Mount source code for hot reload
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=smartfarm.settings
    stdin_open: true
    tty: true
